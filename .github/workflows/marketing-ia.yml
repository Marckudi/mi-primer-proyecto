name: Generar contenido de marketing
 
on:
  schedule:
    # Lunes, miércoles y viernes a las 8:00 UTC (ajusta según tu zona horaria)
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch: {} # te permite lanzarlo manualmente desde la pestaña Actions
 
jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Generar y enviar borrador
        run: node generar_contenido_marketing.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
 
