name: AlphaVision Reels Virales

on:
  schedule:
    # Lunes, miércoles y viernes a las 14:00 UTC (16:00 CEST)
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:
    inputs:
      forzar:
        description: 'Forzar ejecución ahora'
        required: false
        default: 'true'

jobs:
  reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: claude/breaking-news-image-format-dh3K8

      - name: Instalar fuentes para renderizado SVG
        run: sudo apt-get install -y fonts-liberation

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Publicar reel viral
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CONTENT_TYPE_OVERRIDE: reel_viral
        run: npm start
