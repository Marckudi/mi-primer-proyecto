name: AlphaVision — Web Analyzer (24h)

on:
  schedule:
    # Cada día a las 07:00 UTC (09:00 CEST) — antes de abrir mercados
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Mostrar HTML extraído en los logs (para depuración)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Analizar alphavisionai.es
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx src/analyze-web.ts
