name: AlphaVision Reel de Marca

on:
  schedule:
    # Martes y jueves a las 16:00 UTC (18:00 CEST) — hora pico de alcance
    - cron: '0 16 * * 2,4'
  workflow_dispatch:

jobs:
  reel-marca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: claude/breaking-news-image-format-dh3K8

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y fonts-liberation ffmpeg

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Publicar reel de marca
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CONTENT_TYPE_OVERRIDE: reel_marca
        run: npm start
