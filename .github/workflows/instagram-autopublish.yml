name: AlphaVision Instagram Auto-Publish

on:
  schedule:
    # Genera contenido a las 06:00 UTC (08:00 CET)
    - cron: '0 6 * * 1-5'
    # Publica post de mañana a las 09:00 UTC (11:00 CET)
    - cron: '0 9 * * 1-5'
    # Publica post de tarde a las 16:00 UTC (18:00 CET)
    - cron: '0 16 * * 1-5'
    # Sábado: carrusel top 3 a las 12:00 UTC
    - cron: '0 12 * * 6'
    # Domingo: preview semana a las 18:00 UTC
    - cron: '0 18 * * 0'
  workflow_dispatch: # permite lanzarlo manualmente desde GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: claude/extract-alphavision-memory-uGnkq

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: npm start
