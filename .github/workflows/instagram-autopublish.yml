name: AlphaVision Instagram Auto-Publish

on:
  schedule:
    - cron: '0 10 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 12 * * 6'
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Forzar publicación (ignorar horario)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: claude/breaking-news-image-format-dh3K8

      - name: Instalar fuentes para renderizado SVG
        run: sudo apt-get install -y fonts-liberation

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FORCE_ALL_SLOTS: ${{ github.event.inputs.force_all }}
        run: npm start
